<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFlix</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #141414;
      color: #fff;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background-color: #141414;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      color: #e50914;
      margin: 0;
      font-size: 28px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }
    .hero {
      position: relative;
      background: url('https://images.unsplash.com/photo-1605902711622-cfb43c4434f1?fit=crop&w=1500&q=80') no-repeat center center/cover;
      height: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .hero h2 {
      font-size: 48px;
      margin: 0;
    }
    .hero p {
      font-size: 20px;
      margin: 20px 0;
    }
    .hero button {
      padding: 15px 30px;
      background-color: #e50914;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    .section {
      padding: 50px 20px;
    }
    .movies {
      display: flex;
      overflow-x: scroll;
      gap: 10px;
    }
    .movie {
      min-width: 200px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .movie:hover {
      transform: scale(1.1);
    }
    .movie img {
      width: 100%;
      display: block;
    }
    footer {
      background-color: #141414;
      text-align: center;
      padding: 20px;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>StreamFlix</h1>
  <nav>
    <a href="#">Accueil</a>
    <a href="#">Séries</a>
    <a href="#">Films</a>
    <a href="#">Ma Liste</a>
  </nav>
</header>

<div class="hero">
  <h2>Regardez ce que vous voulez, quand vous voulez</h2>
  <p>Des milliers de films et séries à portée de clic</p>
  <button>Commencez maintenant</button>
</div>

<div class="section">
  <h3>Films Populaires</h3>
  <div class="movies">
    <div class="movie"><img src="https://images.unsplash.com/photo-1581905764498-5a8f57c3e9d3?fit=crop&w=400&q=80" alt="Film 1"></div>
    <div class="movie"><img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be?fit=crop&w=400&q=80" alt="Film 2"></div>
    <div class="movie"><img src="https://images.unsplash.com/photo-1598899134739-f1c9f1b575f4?fit=crop&w=400&q=80" alt="Film 3"></div>
    <div class="movie"><img src="https://images.unsplash.com/photo-1581090700227-9f0f9a2b57f7?fit=crop&w=400&q=80" alt="Film 4"></div>
  </div>
</div>

<div class="section">
  <h3>Séries Populaires</h3>
  <div class="movies">
    <div class="movie"><img src="https://images.unsplash.com/photo-1593642632823-8f785ba67e45?fit=crop&w=400&q=80" alt="Série 1"></div>
    <div class="movie"><img src="https://images.unsplash.com/photo-1581905764498-5a8f57c3e9d3?fit=crop&w=400&q=80" alt="Série 2"></div>
    <div class="movie"><img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be?fit=crop&w=400&q=80" alt="Série 3"></div>
    <div class="movie"><img src="https://images.unsplash.com/photo-1581090700227-9f0f9a2b57f7?fit=crop&w=400&q=80" alt="Série 4"></div>
  </div>
</div>

<footer>
  &copy; 2026 StreamFlix. Tous droits réservés.
</footer>

</body>
</html>
